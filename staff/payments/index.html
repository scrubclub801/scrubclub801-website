<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Portal | Payments</title>
  <meta name="robots" content="noindex,nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/staff/assets/css/staff.css" />
</head>
<body data-required-role="employee" data-portal-area="payments">
  <div class="staff-shell">
    <header class="staff-top">
      <div class="staff-top-row">
        <a class="staff-logo" href="/staff/dashboard/">Scrub Club 801 Staff Portal</a>
        <div class="staff-top-meta">
          <span data-email-display></span>
          <span class="role-chip" data-role-display></span>
          <button class="staff-signout" type="button" data-sign-out>Sign Out</button>
        </div>
      </div>
    </header>

    <main class="staff-main">
      <aside class="staff-sidebar">
        <nav class="staff-nav" data-staff-nav aria-label="Staff navigation"></nav>
      </aside>

      <section class="staff-content">
        <div class="staff-page-head">
          <div>
            <h1 class="staff-title">Payments</h1>
            <p class="staff-subtitle">Customer payment and employee payout tracking from saved completed-service records.</p>
          </div>
          <div class="staff-quick-actions">
            <button class="staff-button" type="button" data-nav-target="appointments">Open Appointments</button>
            <button class="staff-admin-cancel" type="button" data-nav-target="customers">Open Clients</button>
          </div>
        </div>

        <div data-ops-payments></div>
      </section>
    </main>
  </div>

  <script src="/staff/assets/js/config.js"></script>
  <script src="/staff/assets/js/auth.js"></script>
  <script src="/staff/assets/js/training.js"></script>
  <script src="/staff/assets/js/guard.js"></script>
  <script src="/staff/assets/js/data-models.js"></script>
  <script src="/staff/assets/js/portal.js"></script>
  <script src="/staff/assets/js/operations.js"></script>
  <script>
    window.StaffPortal.initProtectedPage().then(() => {
      window.StaffOperations.initPage();
    });
  </script>
</body>
</html>
