<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scrub Club 801 | Staff Login</title>
  <meta name="robots" content="noindex,nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/staff/assets/css/staff.css" />
</head>
<body>
  <main class="staff-login-shell">
    <section class="staff-login-card" aria-labelledby="staff-login-title">
      <a class="staff-logo" href="/" aria-label="Scrub Club 801 public site">Scrub Club 801</a>
      <h1 class="staff-login-title" id="staff-login-title">Staff Portal</h1>
      <p class="staff-login-subtitle">Sign in with your staff account to access internal operations pages.</p>

      <form class="staff-form" id="staffLoginForm" novalidate>
        <div class="staff-field">
          <label for="staffEmail">Email</label>
          <input id="staffEmail" name="email" type="email" autocomplete="email" required />
        </div>

        <div class="staff-field">
          <label for="staffPassword">Password</label>
          <input id="staffPassword" name="password" type="password" autocomplete="current-password" required />
        </div>

        <div class="staff-row">
          <label class="staff-checkbox" for="staffRemember">
            <input id="staffRemember" name="remember" type="checkbox" />
            <span>Remember Me</span>
          </label>

          <a class="staff-link" href="#" data-forgot-password>Forgot Password</a>
        </div>

        <button class="staff-button" type="submit">Sign In</button>
        <button class="staff-access-link" type="button" data-open-staff-access>Staff Access</button>
        <p class="staff-message" data-login-message role="status" aria-live="polite"></p>
      </form>

      <section class="staff-welcome" data-login-welcome hidden tabindex="-1" aria-live="polite">
        <p class="staff-welcome-tone">Welcome</p>
        <h2 class="staff-welcome-title" data-login-welcome-title>Signing in</h2>
        <p class="staff-welcome-date" data-login-welcome-date></p>
        <p class="staff-welcome-time" data-login-welcome-time></p>
        <div class="staff-confetti" data-login-confetti></div>
      </section>
    </section>
  </main>

  <div class="staff-admin-modal" data-staff-access-modal hidden>
    <button class="staff-admin-backdrop" type="button" data-close-staff-access aria-label="Close Staff Access"></button>
    <section class="staff-admin-panel" role="dialog" aria-modal="true" aria-labelledby="staffAccessTitle">
      <h2 id="staffAccessTitle">Staff Access</h2>
      <p class="staff-admin-description">Temporary local development sign-in for approved staff profiles.</p>
      <p class="staff-admin-description">Enter your assigned staff PIN to continue.</p>
      <form class="staff-admin-form" id="staffAccessForm" novalidate>
        <label for="staffAccessEmployee">Employee</label>
        <select id="staffAccessEmployee" name="employee" required>
          <option value="nella_maglic">Nella Maglic (Manager)</option>
          <option value="baylee_ellis">Baylee Ellis (Manager)</option>
        </select>

        <label for="staffAccessPin">PIN</label>
        <input id="staffAccessPin" name="pin" type="password" inputmode="numeric" autocomplete="off" required />

        <div class="staff-admin-actions">
          <button class="staff-admin-cancel" type="button" data-close-staff-access>Cancel</button>
          <button class="staff-button" type="submit">Continue</button>
        </div>
        <p class="staff-message" data-staff-access-message role="status" aria-live="polite"></p>
      </form>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/staff/assets/js/config.js"></script>
  <script src="/staff/assets/js/auth.js"></script>
  <script src="/staff/assets/js/login.js"></script>
  <script>
    if (window.StaffLogin && typeof window.StaffLogin.init === "function") {
      window.StaffLogin.init();
    }
  </script>
</body>
</html>
